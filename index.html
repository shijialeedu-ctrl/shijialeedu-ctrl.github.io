<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的菜谱</title>
<style>
body{
    font-family: Arial,sans-serif;
    margin:0;
    padding:10px;
    background:#fafafa;
}
h1{
    text-align:center;
}
.filter-box{
    text-align:center;
    margin-bottom:25px;
}
.filter-btn{
    padding:8px 18px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:white;
    border:1px solid #eee;
    box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.filter-btn.active{
    background:#4CAF50;
    color:white;
}
#menu-list{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    max-width:1400px;
    margin:auto;
}
@media (min-width:768px){
    #menu-list{
        grid-template-columns:
            repeat(auto-fill,minmax(220px,1fr));
    }
}
.card{
    width:100%;
    background:white;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
    transition:.3s;
}
.card:hover{
    transform:translateY(-5px);
}
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}
.card-content{
    padding:12px;
}
.card h3{
    text-align:center;
    margin:0 0 10px;
}
.category{
    color:#e74c3c;
    font-size:14px;
    margin-bottom:5px;
}
.cook-time{
    color:#e67e22;
    font-size:14px;
    margin-bottom:5px;
}
.ingredient-count{
    color:#666;
    font-size:14px;
}
.timer-container{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
    font-size:15px;
}
#recipe-detail{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}
#recipe-detail img{
    width:100%;
    max-width:500px;
    display:block;
    margin:auto;
    border-radius:10px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.back-btn{
    background:#4CAF50;
    color:white;
    margin-top:20px;
}
.hidden{
    display:none;
}
</style>
</head>
<body>
<h1>🍳 我的菜谱</h1>
<div class="filter-box">
    <button class="filter-btn active" onclick="filterRecipes('全部')">
        全部
    </button>
    <button class="filter-btn" onclick="filterRecipes('荤菜')">
        荤菜
    </button>
    <button class="filter-btn" onclick="filterRecipes('素菜')">
        素菜
    </button>
    <button class="filter-btn" onclick="filterRecipes('其他')">
        其他
    </button>
</div>
<div style="text-align:center;margin-bottom:20px;">
    <input
        type="text"
        id="search-input"
        placeholder="🔍 搜索菜名..."
        style="
            width:90%;
            padding:10px;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        "
    >
</div>
<div style="text-align:center;margin-bottom:20px;">
    <button
        onclick="generateShoppingList()"
        style="
            background:#2196F3;
            color:white;
        "
    >
        🛒 生成购物清单
    </button>
</div>
<div id="menu-list"></div>
<div id="recipe-detail" class="hidden"></div>
<div
    id="shopping-list"
    class="hidden"
    style="
        max-width:800px;
        margin:20px auto;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 2px 10px rgba(0,0,0,.15);
    "
></div>
<div
    id="recipe-count"
    style="
        text-align:center;
        margin-top:15px;
        margin-bottom:25px;
        color:#888;
        font-size:14px;
        line-height:2;
    "
></div>
<script>
const recipes = [
    /* 1 番茄炒蛋*/
{
    id:1,
    name:"番茄炒蛋",
    category:"荤菜",
    cookTime:"15分钟",
    image:"images/FQCD.jpg",
    mainIngredients:[
        { name:"鸡蛋", amount:"4个" },
        { name:"番茄", amount:"1个" },
    ],
    seasonings:[
        { name:"盐", amount:"适量" },
        { name:"生抽", amount:"半勺" },
    ],
    steps:{
    prep:[
        "准备鸡蛋液：将鸡蛋打入碗中，加入少量的盐，用筷子打散，搅拌均匀。",
        "切番茄：将番茄洗净后切成小块，去掉蒂部。",
    ],
    cook:[
        "炒鸡蛋：在锅中加入适量的食用油，油热后倒入鸡蛋液，待鸡蛋液开始凝固时，用铲子轻轻翻炒，直到鸡蛋完全凝固，但不要炒得太老，然后盛出备用。",
        "炒番茄：锅中加入少许油，油热后放入番茄块，加入适量的盐（小半勺）和大半勺生抽，用中火翻炒，直到番茄出汁，变得软烂。",
        "混合炒制：将炒好的鸡蛋倒回锅中，与番茄一起翻炒，让鸡蛋吸收番茄的汁水，炒至均匀。",
        "出锅装盘：翻炒均匀后即可出锅装盘。",
    ]    
    },
    notes:[
        "炒鸡蛋不要火太大。",
        "番茄炒出汁味道更好。",
    ]   
},
    /* 2 蚝油生菜*/
{
    id:2,
    name:"蚝油生菜",
    category:"素菜",
    cookTime:"15分钟",
    image:"images/HYSC.jpg",
    mainIngredients:[
        { name:"生菜", amount:"2颗" },
        { name:"大蒜", amount:"2瓣" },
    ],
    seasonings:[
        { name:"生抽", amount:"2勺" },
        { name:"蚝油", amount:"1勺" },
        { name:"盐", amount: "适量" },
    ],
    steps:{
    prep:[
        "清洗生菜并烧水。",
        "料汁：生抽2勺、蚝油1勺、盐小半勺、小半碗水搅拌均匀。",
    ],
    cook:[
        "水中加几滴油和少量盐烧开，下生菜煮软，捞出沥干水分摆盘。",
        "锅里倒适量油，油热后放蒜末炒香，倒入料汁。",
        "料汁烧开后，淋在生菜上即可。",
    ]
    },
    notes:[
        "水中加几滴油和少量盐可以使煮熟后生菜颜色更绿并保留底味。",
    ]
},
    /* 3 香煎脆皮豆腐*/
{
    id:3,
    name:"香煎脆皮豆腐",
    category:"素菜",
    cookTime:"15分钟",
    image:"images/XJCPDF.jpg",
    mainIngredients:[
        { name:"豆腐", amount:"约300g" },
        { name:"大蒜", amount:"3瓣" },
        { name:"小葱", amount:"1根" },
    ],
    seasonings:[
        { name:"生抽", amount:"1勺" },
        { name:"蚝油", amount:"半勺"},
        { name:"盐", amount: "少许" },
        { name: "白胡椒", amount: "少许" },
        { name: "淀粉", amount: "1勺" },    
    ],
    steps:{
    prep:[
        "豆腐先切成厚约1.5cm的小块，用厨房纸轻轻按压吸干表面水分，这一步能减少溅油，也能让外皮更脆。",
        "腌制：碗里放生抽、蚝油、白胡椒和清水搅匀，倒在豆腐上轻轻翻拌，让每块都裹上酱汁，腌5分钟。",
    ],
    cook:[
        "腌好的豆腐表面撒一层薄薄的淀粉，多余的轻轻抖掉。平底锅冷油小火铺开豆腐，保持中小火慢煎。看到边缘变金黄再翻面，耐心煎到两面金黄微焦。",
        "豆腐推到一边，下入蒜末小火炒香，再把豆腐翻拌几下，让蒜香均匀裹在表面，尝一下咸度，不够再少量加盐，最后撒上葱花关火。",
    ]
    },
    notes:[
        "豆腐一定要先吸干水分。",
        "淀粉只裹薄薄一层就够。",
        "全程中小火慢煎，不要频繁翻动。",
    ]
},
    /* 4 金钱蛋*/
{
    id:4,
    name:"金钱蛋",
    category:"荤菜",
    cookTime:"20分钟",
    image:"images/JQD.jpg",
    mainIngredients:[
        { name: "鸡蛋", amount: "4个" },
        { name: "小青辣椒", amount: "1个" },
        { name: "小红辣椒", amount: "1个" },
        { name: "大蒜", amount: "3瓣" },
    ],
    seasonings:[
        { name: "生抽", amount: "2勺" },
        { name: "蚝油", amount: "半勺" },
        { name: "料酒", amount: "半勺" },
        { name: "清水", amount: "3勺" },
        { name: "胡椒粉", amount: "少许" },       
    ],
    steps:{
    prep:[
        "鸡蛋冷水下锅，水开后煮10分钟。捞出过凉水，将鸡蛋切成2cm厚的圆片。",
        "3瓣大蒜切至蒜末，青红辣椒切丁备用。",
        "料汁：生抽2勺、蚝油半勺、料酒半勺、胡椒粉少许、清水3勺。",
    ],
    cook:[
        "锅中倒油，油热后转中小火，下入鸡蛋片，煎至两面金黄微焦，捞出备用。",
        "重新起锅烧油，油热后下蒜末+切好的青红辣椒段，大火翻炒出香辣味。",
        "倒入煎好的金钱蛋。",
        "淋入提前调好的料汁，轻轻翻动，转小火煮1min，让蛋片充分吸满酱汁，即可出锅。",
    ]
    },
    notes:[
        "用线切割鸡蛋不容易破。",
    ]
},
    /* 5 宫保鸡丁*/
{
    id:5,
    name:"宫保鸡丁",
    category:"荤菜",
    cookTime:"30分钟",
    image:"images/GBJD.jpg",
    mainIngredients:[
        { name: "鸡胸肉", amount: "1块" },
        { name: "胡萝卜", amount: "1根" },
        { name: "黄瓜", amount: "1根" },
        { name: "葱", amount: "1段" },
        { name: "蒜", amount: "2瓣" },
        { name: "小辣椒", amount: "1根" },
    ],
    seasonings:[
        { name: "生抽", amount: "2勺" },
        { name: "香醋", amount: "2勺" },
        { name: "料酒", amount: "1勺" },
        { name: "蚝油", amount: "1勺" },
        { name: "白糖", amount: "半勺" },
        { name: "淀粉", amount: "2勺" },
        { name: "盐", amount: "适量" },
        { name: "黑胡椒粉", amount: "适量" },
        { name: "豆瓣酱", amount: "1勺" },
        { name: "清水", amount: "半碗" },       
    ],
    steps:{
    prep:[
        "腌制：鸡胸肉切丁，加1勺料酒、少许盐、少许黑胡椒粉和1勺淀粉进行腌制15min。",
        "料汁：2勺生抽、2勺香醋、1勺蚝油、半勺白糖、1勺淀粉和半碗清水拌匀。",
        "葱、蒜和辣椒切丁备用。",
        "黄瓜和胡萝卜洗净切丁备用。",
    ],
    cook:[
        "锅中少油，倒入腌好的鸡胸肉炒熟盛出备用。",
        "锅中加入适量油，油热加入葱、蒜、辣椒炒香。",
        "加入胡萝卜和黄瓜炒软，加入一勺豆瓣酱。炒出红油加鸡胸肉。",
        "翻炒，最后导入调好的料汁。",
        "大火翻炒至浓稠，即可出锅。",
    ]
    },
    notes:[
        "鸡胸肉丁不要太大。"
    ]
},
    /* 6 酱油炒饭*/
{
    id:6,
    name:"酱油炒饭",
    category:"素菜",
    cookTime:"20分钟",
    image:"images/JYCF.jpg",
    mainIngredients:[
        { name: "米饭", amount: "2碗" },
        { name: "火腿肠", amount: "2根" },
        { name: "鸡蛋", amount: "4个" },
        { name: "小葱", amount: "2根" },        
    ],
    seasonings:[
        { name: "生抽", amount: "2勺" },
        { name: "老抽", amount: "1勺" },
        { name: "蚝油", amount: "1勺" },
        { name: "白糖", amount: "半勺" },
    ],
    steps:{
    prep:[
        "鸡蛋加少许盐搅匀，小葱切葱花（分葱白、葱绿备用），大蒜切末。",
        "料汁：生抽2勺+老抽1勺+蚝油1勺+白糖半勺，加1勺清水搅匀。",
    ],
    cook:[
        "炒鸡蛋：锅中倒适量油，油热后倒入蛋液，用筷子快速划散，炒至金黄凝固后盛出备用。",
        "爆香底料：锅中留少许底油，放入葱白和蒜末，小火炒出香味。",
        "加火腿丁翻炒1min，炒出油脂更香浓。",
        "倒入搓散的隔夜饭，转大火快速翻炒，把米饭炒到微微发干、颗粒分明的状态，大概2-3min。",
        "沿锅边淋入调好的灵魂酱汁，继续大火翻炒，让每一粒米饭都均匀裹上酱汁，颜色变成诱人的琥珀色。翻炒1min后，倒入之前炒好的鸡蛋，加少许盐，翻炒均匀。",
        "出锅装盘：最后撒上葱绿，关火拌匀，焖10s让香味更足。",
    ]
    },
    notes:[
        "炒饭时锅中油比炒菜时锅中油少。"
    ]
},
 /* 7 麻辣香锅*/
{
    id:7,
    name:"麻辣香锅",
    category:"荤菜",
    cookTime:"30分钟",
    image:"images/MLXG.jpg",
    mainIngredients:[
        { name: "金针菇", amount: "适量" },
        { name: "西兰花", amount: "适量" },
        { name: "生菜", amount: "1个" },
        { name: "豆皮", amount: "适量" },
        { name: "豆泡", amount: "适量" },
        { name: "宽粉", amount: "3-5根" },
        { name: "方便面", amount: "1袋" },
        { name: "火锅丸子", amount: "8-10个" },
        { name: "蟹棒", amount: "3-5个" },
        { name: "虾仁", amount: "3-5个" },
        { name: "干辣椒", amount: "适量" },
        { name: "大蒜", amount: "3瓣" },
        { name: "生姜", amount: "1块" },
        { name: "葱", amount: "1根" },                       
    ],
    seasonings:[
        { name: "香锅料", amount: "1块" },
        { name: "生抽", amount: "1勺" },
        { name: "老抽", amount: "1勺" },
        { name: "蚝油", amount: "1勺" },
        { name: "食盐", amount: "适量" },
        { name: "白糖", amount: "适量" },
        { name: "鸡精", amount: "适量" },
    ],
    steps:{
    prep:[
        "烧水添少量油盐，煮熟蔬菜和丸子等备用。",
        "干辣椒、葱、姜和蒜切片备用。",
    ],
    cook:[
        "热锅凉油，待油红后加入干辣椒、葱、姜和蒜爆香。",
        "随后放香锅料炒出香味。",
        "丸子打底，铺上蔬菜等不停翻炒。",
        "加入生抽、老抽和蚝油各一勺，食盐、白糖和鸡精适量不停翻炒。",
        "翻炒均匀后出锅。",
    ]
    },
    notes:[
        "如果使用香锅料不需要加油，如果使用火锅料需要多加一些油。"
    ]
},
 /* 8 火锅低卡蘸料*/
{
    id:8,
    name:"火锅低卡蘸料",
    category:"其他",
    cookTime:"10分钟",
    image:"images/HGDKZL.jpg",
    mainIngredients:[
        { name: "蒜末", amount: "适量" },
        { name: "小米辣", amount: "适量" },
        { name: "葱", amount: "适量" },
        { name: "香菜", amount: "适量" },
        { name: "芝麻", amount: "适量" },                      
    ],
    seasonings:[
        { name: "生抽", amount: "3勺" },
        { name: "醋", amount: "2勺" },
        { name: "香油", amount: "半勺" },
        { name: "凉白开", amount: "2勺" },
    ],
    steps:{
    prep:[
        "葱、蒜、香菜和小米辣切末备用。",
    ],
    cook:[
        "碗中加入葱、蒜、香菜和小米辣末和芝麻，随后加入生抽3勺、醋2勺、香油半勺。",
        "加入凉白开2勺搅拌均匀即可。",
    ]
    },
    notes:[
        "无。"
    ]
},
];
const menuList =
    document.getElementById("menu-list");
const recipeDetail =
    document.getElementById("recipe-detail");
const shoppingList =
    document.getElementById("shopping-list");
const searchInput =
    document.getElementById("search-input");
/*渲染相关函数*/
function renderRecipes(list){
    menuList.innerHTML="";
    list.forEach(recipe=>{
        const card =
        document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <div
                style="
                    text-align:right;
                    padding:10px;
                "
            >
                <input
                    type="checkbox"
                    class="recipe-check"
                    value="${recipe.id}"
                    onclick="event.stopPropagation()"
                >
            </div>
            <img src="${recipe.image}">
            <div class="card-content">
                <h3>${recipe.name}</h3>
                <div class="category">
                    🍱 分类：${recipe.category}
                </div>
                <div class="cook-time">
                    ⏱ 制作时间：${recipe.cookTime}
                </div>
                <div style="margin-top:8px;font-size:14px;">
                    🥬 食材：
                    ${recipe.mainIngredients
                        .map(item => item.name)
                        .join("、")}
                </div>
                <div style="margin-top:5px;font-size:14px;color:#666;">
                    🧂 调料：
                    ${recipe.seasonings
                        .map(item => item.name)
                        .join("、")}
                </div>
            </div>
        `;
        card.onclick=()=>{
            showRecipe(recipe.id);
        };
        menuList.appendChild(card);
    });
}
function showRecipe(id){
    const recipe =
        recipes.find(
            r=>r.id===id
        );
    const detail =
        recipeDetail;
    detail.innerHTML=`
        <h2>${recipe.name}</h2>
        <p>
            🍱 分类：${recipe.category}
        </p>
        <p>
            ⏱ 制作时间：${recipe.cookTime}
        </p>
        <img src="${recipe.image}">
        <h3>🥬 食材</h3>
        <ul>
            ${recipe.mainIngredients.map(item=>`
                <li>
                    ${item.name}：
                    ${item.amount}
                </li>
            `).join("")}
        </ul>
        <h3>🧂 调料</h3>
        <ul>
            ${recipe.seasonings.map(item=>`
                <li>
                    ${item.name}：
                    ${item.amount}
                </li>
            `).join("")}
        </ul>
        <h3>🔪 备菜</h3>
        <ol>
            ${recipe.steps.prep.map(step=>`
                <li>${step}</li>
            `).join("")}
        </ol>
        <h3>🔥 炒菜</h3>
        <ol>
            ${recipe.steps.cook.map(step=>`
                <li>${step}</li>
            `).join("")}
        </ol>
        <h3>⏱ 烹饪计时器</h3>
        <div class="timer-container">
            <button onclick="startTimer(60)">
                1分钟
            </button>
            <button onclick="startTimer(300)">
                5分钟
            </button>
            <button onclick="startTimer(600)">
                10分钟
            </button>
            <button onclick="startTimer(900)">
                15分钟
            </button>
        </div>
        <div
                id="timer-display"
                style="
                    margin-top:15px;
                    font-size:30px;
                    color:#e74c3c;
                    font-weight:bold;
                "
            >
                00:00
        </div>        
        <h3>⚠️ 注意事项</h3>
        <ul>
            ${recipe.notes.map(note=>`
                <li>${note}</li>
            `).join("")}
        </ul>
        <button
            class="back-btn"
            onclick="backMenu()">
            返回菜单
        </button>
    `;
    menuList.style.display="none";
    detail.classList.remove("hidden");
}
function updateRecipeCount(list){
    const meatCount =
        list.filter(
            item=>item.category==="荤菜"
        ).length;
    const vegCount =
        list.filter(
            item=>item.category==="素菜"
        ).length;
    const otherCount =
        list.filter(
            item=>item.category==="其他"
        ).length;
    document.getElementById(
        "recipe-count"
    ).innerHTML =
        `
        🍽 共 ${list.length} 道菜
        ｜🥩 荤菜 ${meatCount}
        ｜🥬 素菜 ${vegCount}
        ｜🥣 其他 ${otherCount}
        `;
}
/*搜索和筛选*/
function searchRecipes(){
    const keyword =
        document
        .getElementById("search-input")
        .value
        .trim();
    const result =
        recipes.filter(recipe =>
            recipe.name.includes(keyword)
            ||
            recipe.mainIngredients
            .some(item=>
                item.name.includes(keyword)
            )
        );
    renderRecipes(result);
    updateRecipeCount(result);
}
function filterRecipes(type){
    document
        .querySelectorAll(".filter-btn")
        .forEach(btn=>{
            btn.classList.remove("active");
        });
    event.target.classList.add("active");
    if(type==="全部"){
        renderRecipes(recipes);
        return;
    }
    const result =
        recipes.filter(
            item=>item.category===type
        );
    renderRecipes(result);
}
/*购物清单*/
function generateShoppingList(){
    const checkedBoxes =
        document.querySelectorAll(
            ".recipe-check:checked"
        );
    if(checkedBoxes.length===0){
        alert("请先选择菜谱");
        return;
    }
    let ingredients = {};
    checkedBoxes.forEach(box=>{
        const recipe =
            recipes.find(
                r=>r.id===Number(box.value)
            );
        if(recipe){
            recipe.mainIngredients.forEach(item=>{
                if(!ingredients[item.name]){
                    ingredients[item.name] = [];
            }
            ingredients[item.name].push(
                item.amount
            );
        });
    }
});
    shoppingList.innerHTML=`
        <h2>🛒 购物清单</h2>   
        <button
            onclick="closeShoppingList()"
            style="
                background:#f44336;
                color:white;
                margin-bottom:15px;
            "
        >
            ❌ 关闭
        </button>
        <ul>
            ${
                Object.entries(ingredients)
                .map(([name,amounts])=>`
                    <li>
                    ${name}
                    （${amounts.join(" + ")}）
                </li>
                `)
                .join("")
            }
        </ul>
    `;
    shoppingList.classList.remove("hidden");
    shoppingList.scrollIntoView({
        behavior:"smooth"
    });
}
function closeShoppingList(){
    shoppingList.classList.add(
        "hidden"
    );
}
/*计时器*/
function startTimer(seconds){
    clearInterval(timerInterval);
    let remain = seconds;
    updateTimer(remain);
    timerInterval =
    setInterval(()=>{
        remain--;
        updateTimer(remain);
        if(remain <= 0){
            clearInterval(timerInterval);
            alert("⏰ 时间到了！");
        }
    },1000);
}
function updateTimer(seconds){
    const min =
        String(
            Math.floor(seconds/60)
        ).padStart(2,"0");
    const sec =
        String(
            seconds%60
        ).padStart(2,"0");
    const display =
        document.getElementById(
            "timer-display"
        );
    if(display){
        display.textContent =
            `${min}:${sec}`;
    }
}
/*页面控制*/
function backMenu(){
    menuList.style.display="";
    recipeDetail.classList.add("hidden");
}
function init(){
    renderRecipes(recipes);
    updateRecipeCount(recipes);
    searchInput.addEventListener(
        "input",
        searchRecipes
    );
}
init();
let timerInterval;
</script>
</body>
</html>
